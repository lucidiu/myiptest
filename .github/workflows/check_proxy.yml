name: Proxy Checker
on:
  schedule:
    - cron: '0 * * * *' # 每小时自动运行一次
  workflow_dispatch: # 允许手动运行

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Run Stable Async Checker
        run: |
          python <<EOF
          import asyncio
          import socket
          import sys

          async def check_ip(line):
              # 这里的 line 是原始的整行数据，例如 "47.239.4.246,443,HK..."
              try:
                  parts = line.strip().split(',')
                  if len(parts) < 2:
                      return None
                  
                  ip = parts[0].strip()
                  port = parts[1].strip()
                  
                  # 尝试建立 TCP 连接，设置 3 秒超时
                  conn = asyncio.open_connection(ip, int(port))
                  await asyncio.wait_for(conn, timeout=3)
                  
                  # 【关键修改】：如果连接成功，返回整行原始数据，以便后续在 CF Worker 中筛选国家
                  return line.strip()
              except:
                  return None

          async def main():
              # 1. 读取原始数据
              try:
                  with open('raw_nodes.txt', 'r') as f:
                      lines = f.readlines()
                  print(f"Successfully read {len(lines)} lines from raw_nodes.txt")
              except FileNotFoundError:
                  print("Warning: raw_nodes.txt not found. Creating an empty one.")
                  with open('raw_nodes.txt', 'w') as f: f.write("")
                  lines = []
              except Exception as e:
                  print(f"Unexpected read error: {e}")
                  lines = []

              # 2. 创建异步任务列表
              tasks = []
              for line in lines:
                  line = line.strip()
                  if not line: continue
                  tasks.append(check_ip(line))

              if not tasks:
                  print("No valid node format found in raw_nodes.txt. Skipping check.")
                  with open('clean_nodes.txt', 'w') as f: f.write("")
                  return

              print(f"Checking {len(tasks)} nodes concurrently...")
              
              # 3. 并发执行所有测试任务
              try:
                  results = await asyncio.gather(*tasks)
              except Exception as e:
                  print(f"Error during concurrent check: {e}")
                  results = []
              
              # 4. 过滤出所有非 None 的结果（即测试通过的整行数据）
              valid_nodes = [node for node in results if node is not None]

              # 5. 将结果写入 clean_nodes.txt
              try:
                  with open('clean_nodes.txt', 'w') as f:
                      f.write('\n'.join(valid_nodes))
                  print(f"Finished. {len(valid_nodes)}/{len(tasks)} nodes are alive.")
              except Exception as e:
                  print(f"Write error: {e}")

          # 运行异步主函数，并强制返回成功状态，防止 GitHub 禁用 Workflow
          try:
              asyncio.run(main())
          except Exception as e:
              print(f"Global Critical Error: {e}")
              sys.exit(0) 
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "ProxyBot"
          git config --global user.email "bot@github.com"
          git add clean_nodes.txt
          # 如果没有文件更新，commit 会报错，使用 || exit 0 确保 Action 依然显示成功
          git commit -m "Update clean nodes list [skip ci]" || exit 0
          git push
